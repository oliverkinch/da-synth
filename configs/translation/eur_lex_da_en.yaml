task: translation
seed_dataset: oliverkinch/eur-lex
seed_subset: all
seed_split: train
source_column: da_document
target_column: en_document
direction: da->en
n_samples: 2000
persona_sampling: false
system_prompt_rate: 0.3
filters:
  min_assistant_tokens: 30
  max_repetition_ratio: 0.4
  language_check: false  # DA->EN output is English, skip Danish check
